<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח</title>

<style>
body {
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.video-container {
    position: relative;
    width: 90%;
    max-width: 900px;
}

video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
}

.overlay-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 60px;
    font-weight: bold;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
    pointer-events: none;
}
</style>
</head>

<body>

<div class="video-container">
    <video controls autoplay loop>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>
    <div class="overlay-text">פורים שמח</div>
</div>

</body>
</html>
