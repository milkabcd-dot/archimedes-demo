<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח</title>

<style>
body {
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.video-container {
    position: relative;
    width: 90%;
    max-width: 900px;
}

video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
}

.overlay-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    display: none;
    pointer-events: none;
}

.overlay-text .main {
    font-size: 64px;
    font-weight: bold;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.8);
}

/* מסך סיום צבעוני */
.ending-screen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-radius: 12px;
}

/* אפקט טקסט צבעוני זז */
.colorful-text {
    background: linear-gradient(to left, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow 5s ease infinite;
    font-size: 70px;
    font-weight: bold;
    margin: 0;
}

@keyframes rainbow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.ending-screen p {
    font-size: 36px;
    margin-top: 20px;
    color: white;
}
</style>
</head>

<body>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>

    <div class="overlay-text" id="greeting">
        <div class="main">פורים שמח</div>
    </div>

    <div class="ending-screen" id="ending">
        <div>
            <h1 class="colorful-text">חג שמח!</h1>
            <p>נתראה בשמחות 🎭</p>
        </div>
    </div>
</div>

<script>
const video = document.getElementById("myVideo");
const greeting = document.getElementById("greeting");
const ending = document.getElementById("ending");

let playCount = 0;
const maxPlays = 3; // הגדרה ל-3 פעמים

video.addEventListener("play", () => {
    greeting.style.display = "block";
    // מחזיר את הברכה לאמצע אם היא הוסתרה
});

video.addEventListener("ended", () => {
    playCount++;
    if (playCount < maxPlays) {
        video.currentTime = 0;
        video.play();
    } else {
        // הסתרת הוידאו והצגת מסך סיום צבעוני
        video.style.display = "none";
        greeting.style.display = "none";
        ending.style.display = "flex";
    }
});
</script>

</body>
</html>
