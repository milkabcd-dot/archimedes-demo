<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח</title>

<style>
body {
    margin: 0;
    background-color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
}

.video-container {
    position: relative;
    width: 90%;
    max-width: 900px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border-radius: 15px;
    overflow: hidden;
}

video {
    width: 100%;
    height: auto;
    display: block;
}

/* מסך סיום צבעוני ומרהיב */
.ending-screen {
    position: absolute;
    inset: 0;
    /* רקע צבעוני הדרגתי */
    background: linear-gradient(45deg, #ff00cc, #3333ff, #24ff72, #ff6600);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.ending-content h1 {
    font-size: 70px;
    margin: 0;
    text-shadow: 4px 4px 15px rgba(0,0,0,0.3);
    animation: bounce 2s infinite;
}

.ending-content p {
    font-size: 40px;
    margin: 10px 0;
}

/* הקרדיט למטה */
.credit {
    position: absolute;
    bottom: 30px;
    font-size: 24px;
    font-weight: bold;
    opacity: 0.9;
    border-top: 2px solid rgba(255,255,255,0.3);
    padding-top: 10px;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* כיתוב בזמן הוידאו */
.overlay-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    display: none;
    pointer-events: none;
}

.overlay-text .main {
    font-size: 60px;
    font-weight: bold;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>

    <div class="overlay-text" id="greeting">
        <div class="main">פורים שמח</div>
    </div>

    <div class="ending-screen" id="ending">
        <div class="ending-content">
            <h1>חג שמח!</h1>
            <p>נתראה בשמחות 🎭</p>
        </div>
        <div class="credit">עריכה: מילכה ברקו גרש</div>
    </div>
</div>

<script>
const video = document.getElementById("myVideo");
const greeting = document.getElementById("greeting");
const ending = document.getElementById("ending");

let playCount = 0;

video.addEventListener("play", () => {
    greeting.style.display = "block";
});

video.addEventListener("ended", () => {
    playCount++;
    if (playCount < 3) {
        video.currentTime = 0;
        video.play();
    } else {
        // מסתירים את הוידאו ומציגים את המסך הצבעוני
        video.style.display = "none";
        greeting.style.display = "none";
        ending.style.display = "flex";
    }
});
</script>

</body>
</html>
