<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח</title>

<style>
body {
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

.video-container {
    position: relative;
    width: 95%;
    max-width: 1000px;
}

video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 15px;
}

/* ברכה מרכזית גדולה */
#greeting {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* ממרכז בדיוק לאמצע */
    color: #fff;
    font-size: clamp(60px, 15vw, 120px); /* גודל ענק שמתאים את עצמו למסך */
    font-weight: bold;
    text-align: center;
    text-shadow: 4px 4px 20px rgba(0,0,0,0.9), 0 0 30px #ff00de; /* צבעוניות מסביב לטקסט */
    white-space: nowrap;
    pointer-events: none;
    display: none;
    z-index: 10;
}

/* קרדיט קטן למטה */
.credit {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 16px;
    background: rgba(0, 0, 0, 0.4);
    padding: 2px 12px;
    border-radius: 10px;
    z-index: 20;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>

    <div id="greeting">פורים שמח 🎭</div>
    <div class="credit">עריכה: מילכה ברקו גרש</div>
</div>

<script>
const video = document.getElementById("myVideo");
const greeting = document.getElementById("greeting");

let playCount = 0;

video.addEventListener("play", () => {
    greeting.style.display = "block";
});

video.addEventListener("ended", () => {
    playCount++;
    if (playCount < 3) {
        video.currentTime = 0;
        video.play();
    } else {
        // בסוף הפעם השלישית הוידאו פשוט עוצר על הפריים האחרון
        video.pause();
        // הברכה נשארת מוצגת בגדול
    }
});
</script>

</body>
</html>
