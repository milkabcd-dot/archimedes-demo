<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח</title>

<style>
body {
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.video-container {
    position: relative;
    width: 90%;
    max-width: 900px;
}

video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
}

.overlay-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    display: none; /* מוסתר בהתחלה */
    pointer-events: none;
}

.overlay-text .main {
    font-size: 64px;
    font-weight: bold;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.8);
}

.overlay-text .sub {
    font-size: 40px;
    margin-top: 15px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>
    <div class="overlay-text" id="greeting">
        <div class="main">פורים שמח</div>
        <div class="sub">ממילכה ברקו גרש</div>
    </div>
</div>

<script>
const video = document.getElementById("myVideo");
const greeting = document.getElementById("greeting");

video.addEventListener("play", () => {
    greeting.style.display = "block";
});
</script>

</body>
</html>
