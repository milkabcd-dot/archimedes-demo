<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח - מילכה ברקו גרש</title>

<style>
body {
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

.video-container {
    position: relative;
    width: 95%;
    max-width: 1000px;
    border-radius: 15px;
    overflow: hidden;
    background: #000;
}

video {
    width: 100%;
    height: auto;
    display: block;
    z-index: 1;
}

/* כותרת ברבע העליון */
#greeting {
    position: absolute;
    top: 25%; 
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(45deg, #f3ec78, #af4261, #57d1ff, #62ff00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: clamp(50px, 12vw, 110px);
    font-weight: bold;
    text-align: center;
    filter: drop-shadow(3px 3px 8px rgba(0,0,0,0.9));
    white-space: nowrap;
    pointer-events: none;
    display: none;
    z-index: 10;
}

/* שם בלבד - מורם יותר */
.credit {
    position: absolute;
    bottom: 80px; /* הועלה עוד קצת */
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
    z-index: 20;
    pointer-events: none;
}

/* אנימציית קונפטי */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    z-index: 5;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="video-container" id="container">
    <video id="myVideo" controls>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>

    <div id="greeting">פורים שמח</div>
    <div class="credit">מילכה ברקו גרש</div>
</div>

<script>
const video = document.getElementById("myVideo");
const greeting = document.getElementById("greeting");
const container = document.getElementById("container");

let playCount = 0;

// פונקציה ליצירת קונפטי
function createConfetti() {
    for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
        confetti.style.opacity = Math.random();
        container.appendChild(confetti);
        
        // הסרה של האלמנט אחרי האנימציה
        setTimeout(() => confetti.remove(), 5000);
    }
}

video.addEventListener("play", () => {
    greeting.style.display = "block";
    createConfetti(); // יוצר קונפטי כשהסרטון מתחיל
});

video.addEventListener("ended", () => {
    playCount++;
    if (playCount < 3) {
        video.currentTime = 0;
        video.play();
        createConfetti(); // עוד קונפטי בכל סבב
    } else {
        video.pause();
    }
});
</script>

</body>
</html>
