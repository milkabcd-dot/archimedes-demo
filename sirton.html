<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח</title>

<style>
body {
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.video-container {
    position: relative;
    width: 90%;
    max-width: 900px;
}

video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
}

.overlay-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    display: none;
    pointer-events: none;
}

.overlay-text .main {
    font-size: 64px;
    font-weight: bold;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.8);
}

.overlay-text .sub {
    font-size: 40px;
    margin-top: 15px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
}

/* מסך סיום */
.ending-screen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    border-radius: 12px;
}

.ending-screen h1 {
    font-size: 60px;
    margin: 0;
}

.ending-screen p {
    font-size: 36px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>

    <div class="overlay-text" id="greeting">
        <div class="main">פורים שמח</div>
        <div class="sub">ממילכה ברקו גרש</div>
    </div>

    <div class="ending-screen" id="ending">
        <div>
            <h1>חג שמח!</h1>
            <p>נתראה בשמחות 🎭</p>
        </div>
    </div>

</div>

<script>
const video = document.getElementById("myVideo");
const greeting = document.getElementById("greeting");
const ending = document.getElementById("ending");

let playCount = 0;

video.addEventListener("play", () => {
    greeting.style.display = "block";
});

video.addEventListener("ended", () => {
    playCount++;
    if (playCount < 4) {
        video.currentTime = 0;
        video.play();
    } else {
        ending.style.display = "flex";
    }
});
</script>

</body>
</html>
