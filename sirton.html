<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פורים שמח</title>

<style>
body {
    margin: 0;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

.video-container {
    position: relative;
    width: 90%;
    max-width: 900px;
    min-height: 400px; /* מבטיח שהמסך לא יקרוס כשנמחק הוידאו */
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    height: auto;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(255,255,255,0.1);
}

/* מסך סיום צבעוני משתנה */
#ending {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display: none; /* מוסתר בהתחלה */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 15px;
    color: white;
    z-index: 999; /* מעל הכל */
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.ending-content h1 {
    font-size: clamp(40px, 8vw, 70px);
    margin: 0;
    text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
}

.ending-content p {
    font-size: clamp(20px, 4vw, 36px);
    margin-top: 10px;
}

.credit {
    position: absolute;
    bottom: 20px;
    font-size: 18px;
    background: rgba(0,0,0,0.2);
    padding: 5px 15px;
    border-radius: 20px;
}

/* טקסט צף בזמן הוידאו */
#greeting {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 30px;
    font-weight: bold;
    text-shadow: 2px 2px 5px black;
    display: none;
    z-index: 10;
}
</style>
</head>

<body>

<div class="video-container" id="container">
    <video id="myVideo" controls>
        <source src="פורים 2026.mp4" type="video/mp4">
        הדפדפן שלך לא תומך בוידאו.
    </video>

    <div id="greeting">פורים שמח 🎭</div>

    <div id="ending">
        <div class="ending-content">
            <h1>חג שמח!</h1>
            <p>נתראה בשמחות</p>
        </div>
        <div class="credit">עריכה: מילכה ברקו גרש</div>
    </div>
</div>

<script>
const video = document.getElementById("myVideo");
const greeting = document.getElementById("greeting");
const ending = document.getElementById("ending");

let playCount = 0;

video.addEventListener("play", () => {
    greeting.style.display = "block";
});

video.addEventListener("ended", () => {
    playCount++;
    if (playCount < 3) {
        video.currentTime = 0;
        video.play();
    } else {
        // התיקון הקריטי: מעלימים את הוידאו לגמרי ומציגים את המסך הצבעוני
        video.style.display = "none";
        greeting.style.display = "none";
        ending.style.display = "flex";
        
        // מוודא שהקונטיינר מקבל גובה גם בלי הוידאו
        document.getElementById("container").style.height = "500px";
    }
});
</script>

</body>
</html>
